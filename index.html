<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عطارة المغربلين — بهارات و أعشاب طبيعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#8B4513;--pd:#5C2D0E;--pl:#A0522D;--ac:#DAA520;--al:#F0C040;--bg:#FFF8F0;--card:#fff;--txt:#333;--txtl:#777;--txtm:#aaa;--brd:#E8DDD0;--sh:0 2px 15px rgba(0,0,0,.08);--shl:0 8px 30px rgba(0,0,0,.12);--r:14px;--rs:10px;--t:all .3s ease}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--ac);border-radius:4px}
.hdr{background:linear-gradient(135deg,var(--pd),var(--p),var(--pl));color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.hdr-in{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff}
.logo-ic{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo h1{font-size:22px;font-weight:800}.logo span{font-size:11px;opacity:.8}
.hdr-acts{display:flex;gap:8px;align-items:center}
.btn{padding:9px 18px;border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:var(--t);border:none;display:inline-flex;align-items:center;gap:6px}
.btn-n{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-n:hover{background:rgba(255,255,255,.25)}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-a{background:var(--ac);color:#fff}.btn-a:hover{background:var(--al)}
.btn-d{background:#d44;color:#fff}.btn-d:hover{background:#b22}
.btn-s{background:var(--bg);color:var(--txt);border:1px solid var(--brd)}.btn-s:hover{background:var(--brd)}
.btn-sm{padding:6px 14px;font-size:12px}
.hero{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:50px 24px 70px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(218,165,32,.15),transparent 70%);border-radius:50%}
.hero-c{position:relative;z-index:1;max-width:600px;margin:0 auto}
.hero h2{font-size:36px;font-weight:800;margin-bottom:12px}.hero p{font-size:16px;opacity:.9;font-weight:300}
.badge{display:inline-block;background:rgba(218,165,32,.2);color:var(--al);padding:5px 16px;border-radius:20px;font-size:12px;margin-bottom:16px;border:1px solid rgba(218,165,32,.3)}
.stats{max-width:1200px;margin:-35px auto 30px;padding:0 24px;position:relative;z-index:2}
.stats-in{background:var(--card);border-radius:var(--r);box-shadow:var(--shl);padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center}
.stat h4{font-size:28px;font-weight:800;color:var(--p)}.stat p{font-size:12px;color:var(--txtl)}
.main{max-width:1200px;margin:0 auto;padding:20px 24px 50px}
.sec-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sec-t{font-size:24px;font-weight:700;color:var(--pd)}.sec-s{color:var(--txtl);font-size:14px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--brd);transition:var(--t);position:relative}
.card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.card-img{width:100%;height:200px;object-fit:cover;background:#f0e6d8}
.card-body{padding:18px}.card-title{font-size:17px;font-weight:700;margin-bottom:6px}.card-desc{font-size:13px;color:var(--txtl);margin-bottom:10px}
.card-price{font-size:20px;font-weight:800;color:var(--p)}.card-price small{font-size:12px;color:var(--txtl);font-weight:400}
.view{display:none}.view.on{display:block}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--p);font-weight:500;cursor:pointer;margin-bottom:20px;padding:8px 14px;border-radius:var(--rs);transition:var(--t);background:none;border:none;font-family:inherit;font-size:14px}.back:hover{background:rgba(139,69,19,.08)}
.view-hdr{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;border-radius:var(--r);padding:30px;margin-bottom:24px}
.view-hdr h2{font-size:28px;margin-bottom:6px}.view-hdr p{opacity:.85;font-size:14px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.prod-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--brd);transition:var(--t)}
.prod-card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.prod-img{width:100%;height:200px;object-fit:cover;background:#f0e6d8;cursor:pointer}
.prod-body{padding:16px}.prod-title{font-size:16px;font-weight:700;margin-bottom:4px}.prod-desc{font-size:12px;color:var(--txtl);margin-bottom:8px}
.prod-price{font-size:18px;font-weight:800;color:var(--p);margin-bottom:10px}
.prod-acts{display:flex;gap:6px}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.mo.on{display:flex}
.md{background:var(--card);border-radius:var(--r);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.md-h{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center}
.md-h h3{font-size:18px;font-weight:700}
.md-x{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--t)}.md-x:hover{background:#fee;color:#c33}
.md-b{padding:24px}.md-f{padding:16px 24px;border-top:1px solid var(--brd);display:flex;gap:10px;justify-content:flex-end}
.fg{margin-bottom:18px}.fg label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;border:2px solid var(--brd);border-radius:var(--rs);font-family:inherit;font-size:14px;transition:var(--t);background:var(--bg);color:var(--txt);direction:rtl}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(139,69,19,.1)}
.fg textarea{min-height:100px;resize:vertical}
.up-area{border:2px dashed var(--brd);border-radius:var(--rs);padding:24px;text-align:center;cursor:pointer;transition:var(--t)}
.up-area:hover{border-color:var(--p)}.up-area p{color:var(--txtl);font-size:13px}
.imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.img-it{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.img-it img{width:100%;height:100%;object-fit:cover}
.img-rm{position:absolute;top:3px;left:3px;width:22px;height:22px;background:rgba(200,30,30,.9);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:50px 16px;color:var(--txtm)}.empty-ic{font-size:48px;margin-bottom:12px;opacity:.5}.empty h4{font-size:16px;color:var(--txtl);margin-bottom:6px}
.lb{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center;cursor:pointer}.lb.on{display:flex}.lb img{max-width:90vw;max-height:90vh;object-fit:contain}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--pd);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;z-index:3000;transition:transform .4s ease;box-shadow:var(--shl)}.toast.on{transform:translateX(-50%) translateY(0)}
.ftr{background:var(--pd);color:rgba(255,255,255,.7);text-align:center;padding:24px;font-size:13px}
.auth-box{max-width:450px;margin:60px auto;background:var(--card);border-radius:var(--r);padding:40px;box-shadow:var(--shl);text-align:center}
.auth-box h2{font-size:24px;color:var(--pd);margin-bottom:20px}
.cart-badge{position:absolute;top:-5px;left:-5px;background:#d44;color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-icon{position:relative;cursor:pointer;font-size:20px}
.cart-items{max-height:400px;overflow-y:auto}
.cart-item{display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--brd);align-items:center}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:8px}
.cart-item-info{flex:1;text-align:right}.cart-item-info h4{font-size:14px;font-weight:600}.cart-item-info p{font-size:12px;color:var(--txtl)}
.cart-qty{display:flex;align-items:center;gap:8px}
.cart-qty button{width:28px;height:28px;border:1px solid var(--brd);background:var(--bg);border-radius:6px;cursor:pointer;font-size:16px}
.cart-total{text-align:left;padding:16px;font-size:18px;font-weight:700;color:var(--p)}
.pay-info{background:var(--bg);border-radius:var(--rs);padding:16px;margin:12px 0;border:1px solid var(--brd)}
.pay-info h4{color:var(--p);margin-bottom:8px}
.pay-num{font-size:20px;font-weight:700;color:var(--pd);letter-spacing:2px;direction:ltr;text-align:center;padding:10px;background:#fff;border-radius:8px;margin:8px 0}
.order-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--brd);margin-bottom:16px}
.order-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.order-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.st-pending{background:#fff3cd;color:#856404}.st-confirmed{background:#d4edda;color:#155724}.st-delivered{background:#cce5ff;color:#004085}
.social-bar{position:fixed;bottom:80px;left:20px;z-index:50;display:flex;flex-direction:column;gap:10px}
.social-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.2);transition:var(--t);text-decoration:none;border:none;cursor:pointer}
.social-btn:hover{transform:scale(1.1)}
.social-wa{background:#25D366}.social-fb{background:#1877F2}
.price-tag{position:absolute;top:12px;left:12px;background:var(--ac);color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;z-index:2}
.stock-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.stock-ok{background:#d4edda;color:#155724}.stock-low{background:#fff3cd;color:#856404}.stock-out{background:#f8d7da;color:#721c24}
@media(max-width:768px){.hdr-in{padding:12px 16px}.logo h1{font-size:18px}.hero{padding:36px 16px 50px}.hero h2{font-size:26px}.stats-in{grid-template-columns:repeat(2,1fr);padding:16px}.main{padding:16px 12px 40px}.grid,.prod-grid{grid-template-columns:1fr}.social-bar{bottom:70px;left:12px}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="lb" id="lb" onclick="closeLb()"><img id="lbImg"></div>
<div class="social-bar" id="socialBar"></div>
<script>
const DC=[
  {id:'c1',name:'بهارات مطحونة',icon:'🌶️',desc:'فلفل أسود، كمون، كركم، كزبرة'},
  {id:'c2',name:'بهارات كاملة',icon:'🫘',desc:'هيل، قرنفل، ورق غار، فلفل أحمر'},
  {id:'c3',name:'أعشاب طبية',icon:'🌿',desc:'نعناع، زعتر، إكليل الجبل، خزامى'},
  {id:'c4',name:'أعشاب للشاي',icon:'🍵',desc:'يانسون، شمر، عرق سوس، بابونج'},
  {id:'c5',name:'مكسرات وفواكه مجففة',icon:'🥜',desc:'لوز، جوز، زبيب، تين مجفف'},
  {id:'c6',name:'زيوت طبيعية',icon:'🫒',desc:'زيت زيتون، زيت حبة السوداء، زيت خروع'},
  {id:'c7',name:'عسل ومنتجات النحل',icon:'🍯',desc:'عسل طبيعي، شمع، غذاء ملكات'},
  {id:'c8',name:'خلطات عطارة',icon:'✨',desc:'خلطات جاهزة للطبخ والعلاج'},
  {id:'c9',name:'توابل حلويات',icon:'🍰',desc:'قرفة، فانيلا، زعفران، مستكة'},
  {id:'c10',name:'منتجات العناية',icon:'🧴',desc:'صابون طبيعي، كريمات، زيوت تدليك'}
];
const DP=[
  {id:'p1',cat:'c1',name:'فلفل أسود مطحون',desc:'فلفل أسود درجة أولى من الهند، طعم حار مميز',price:45,img:'',stock:100},
  {id:'p2',cat:'c1',name:'كمون مطحون',desc:'كمون أبيض فاخر مطحون طازج للطبخ اليومي',price:35,img:'',stock:80},
  {id:'p3',cat:'c1',name:'كركم ذهبي',desc:'كركم هندي أصلي للطبخ والعناية بالبشرة',price:30,img:'',stock:120},
  {id:'p4',cat:'c2',name:'هيل أخضر فاخر',desc:'هيل أخضر كامل درجة أولى للقهوة والشاي',price:80,img:'',stock:60},
  {id:'p5',cat:'c2',name:'قرنفل عطري',desc:'قرنفل كامل عطري فاخر للطبخ والعلاج',price:55,img:'',stock:70},
  {id:'p6',cat:'c3',name:'زعتر بري طبيعي',desc:'زعتر بري مجفف طبيعي 100% من الجبال',price:40,img:'',stock:90},
  {id:'p7',cat:'c3',name:'نعناع عطري',desc:'نعناع عطري مجفف للشاي المنعش والطبخ',price:25,img:'',stock:150},
  {id:'p8',cat:'c4',name:'بابونج مهدئ',desc:'أزهار بابونج مجففة للشاي المهدئ والمريح',price:30,img:'',stock:100},
  {id:'p9',cat:'c5',name:'لوز نيئ فاخر',desc:'لوز مصري درجة أولى غير محمص لل healthy snacking',price:120,img:'',stock:50},
  {id:'p10',cat:'c6',name:'زيت زيتون بكر',desc:'زيت زيتون بكر ممتاز معصور على البارد',price:95,img:'',stock:40},
  {id:'p11',cat:'c7',name:'عسل سدر جبلي',desc:'عسل سدر جبلي أصلي من أحضان الطبيعة',price:200,img:'',stock:30},
  {id:'p12',cat:'c8',name:'بهارات كبسة',desc:'خلطة كبسة سعودية أصلية ببهارات مميزة',price:50,img:'',stock:80},
  {id:'p13',cat:'c9',name:'قرفة سيلانية',desc:'قرفة سيلانية عود فاخرة للحلويات والمشروبات',price:65,img:'',stock:60},
  {id:'p14',cat:'c10',name:'صابون زيت زيتون',desc:'صابون طبيعي بزيت الزيتون والغار للبشرة',price:35,img:'',stock:100},
  {id:'p15',cat:'c3',name:'إكليل الجبل',desc:'إكليل الجبل الطازج المجفف للطبخ والعلاج',price:35,img:'',stock:75}
];
const COLORS=['#8B4513','#A0522D','#6B8E23','#556B2F','#8FBC8F','#CD853F','#D2691E','#B8860B','#DAA520','#BC8F8F','#9ACD32','#6B8E23','#D2691E','#A0522D','#8B4513'];

function genImg(n,c){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:${c};stop-opacity:.85"/><stop offset="100%" style="stop-color:${c};stop-opacity:.35"/></linearGradient></defs><rect width="400" height="300" fill="url(#g)"/><text x="200" y="120" text-anchor="middle" font-size="56" fill="white" opacity=".7">🌿</text><text x="200" y="185" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="20" font-weight="700" fill="white">${n}</text><text x="200" y="215" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="14" fill="white" opacity=".7">عطارة المغربلين</text></svg>`;
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
}
<script>
let db=JSON.parse(localStorage.getItem('attara_db'))||null;
if(!db){
  db={cats:DC.map(c=>({...c})),products:DP.map((p,i)=>({...p,img:genImg(p.name,COLORS[i%COLORS.length])})),users:[],orders:[],cart:[],adminPass:'123456',
  paymentMethods:[{type:'instapay',number:'01012345678',name:'عطارة المغربلين'},{type:'vodafone',number:'01098765432',name:'عطارة المغربلين'}],
  socialLinks:{whatsapp:'https://wa.me/201012345678',facebook:'https://facebook.com/attara'},currentUser:null};
  saveDb();
}
function saveDb(){localStorage.setItem('attara_db',JSON.stringify(db))}

let cv='home',cc=null,ei=null,et=null,pImgs=[],dCb=null,payShot='';

function render(){
  const a=document.getElementById('app');
  let h='';
  h+=rHdr();
  if(cv==='auth'){h+=rAuth()}
  else if(cv==='home'){h+=rHero();h+=rStats();h+=rCats()}
  else if(cv==='cat'){h+=rCatV()}
  else if(cv==='cart'){h+=rCart()}
  else if(cv==='checkout'){h+=rCheckout()}
  else if(cv==='orders'){h+=rOrders()}
  else if(cv==='admin'){h+=rAdmin()}
  else if(cv==='adminOrders'){h+=rAdOrd()}
  else if(cv==='adminCats'){h+=rAdCats()}
  else if(cv==='adminProds'){h+=rAdProds()}
  else if(cv==='adminSettings'){h+=rAdSet()}
  h+=rFtr();
  a.innerHTML=h;
  rSocial();
}

function rHdr(){
  const u=db.currentUser;
  const cc=db.cart.reduce((s,i)=>s+i.qty,0);
  return `<header class="hdr"><div class="hdr-in">
    <a class="logo" href="#" onclick="go('home')"><div class="logo-ic">🏪</div><div><h1>عطارة المغربلين</h1><span>بهارات و أعشاب طبيعية</span></div></a>
    <div class="hdr-acts">
      ${u?`<div class="cart-icon" onclick="go('cart')">🛒${cc>0?`<span class="cart-badge">${cc}</span>`:''}</div>
      <button class="btn btn-n btn-sm" onclick="go('orders')">📦 طلباتي</button>
      <button class="btn btn-n btn-sm" onclick="logout()">🚪 خروج</button>
      ${u.isAdmin?`<button class="btn btn-sm" style="background:var(--ac);color:#fff" onclick="go('admin')">⚙️ لوحة التحكم</button>`:''}`
      :`<div class="cart-icon" onclick="go('cart')">🛒${cc>0?`<span class="cart-badge">${cc}</span>`:''}</div>
      <button class="btn btn-n btn-sm" onclick="go('auth')">🔑 تسجيل الدخول</button>`}
    </div>
  </div></header>`;
}

function rSocial(){
  const bar=document.getElementById('socialBar');
  bar.innerHTML='';
  if(db.socialLinks.whatsapp)bar.innerHTML+=`<a class="social-btn social-wa" href="${db.socialLinks.whatsapp}" target="_blank" title="واتساب">💬</a>`;
  if(db.socialLinks.facebook)bar.innerHTML+=`<a class="social-btn social-fb" href="${db.socialLinks.facebook}" target="_blank" title="فيسبوك">📘</a>`;
}

// AUTH
function rAuth(){
  return `<div class="main"><div class="auth-box">
    <div style="font-size:48px;margin-bottom:12px">🏪</div><h2>مرحباً بك في عطارة المغربلين</h2>
    <p style="color:var(--txtl);margin-bottom:24px">سجل دخولك لإتمام الشراء</p>
    <div id="loginForm">
      <div class="fg"><label>البريد الإلكتروني</label><input type="email" id="aE" placeholder="example@email.com"></div>
      <div class="fg"><label>كلمة المرور</label><input type="password" id="aP" placeholder="••••••••"></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-p" style="flex:1" onclick="login()">تسجيل الدخول</button>
        <button class="btn btn-a" style="flex:1" onclick="showReg()">حساب جديد</button>
      </div>
    </div>

function register(){
  const n=document.getElementById('rN').value.trim(),e=document.getElementById('rE').value.trim(),ph=document.getElementById('rPh').value.trim(),pa=document.getElementById('rPa').value;
  if(!n||!e||!ph||!pa)return toast('⚠️ أكمل جميع الحقول');
  if(db.users.find(u=>u.email===e))return toast('⚠️ البريد مسجل مسبقاً');
  const u={id:'u_'+Date.now(),email:e,phone:ph,name:n,pass:pa,isAdmin:false};
  db.users.push(u);db.currentUser=u;saveDb();toast('✅ تم التسجيل بنجاح');go('home');
}

function login(){
  const e=document.getElementById('aE').value.trim(),p=document.getElementById('aP').value;
  if(e==='admin@attara.com'&&p===db.adminPass){db.currentUser={id:'admin',email:e,name:'المدير',isAdmin:true};saveDb();toast('✅ مرحباً أيها المدير');go('home');return}
  const u=db.users.find(u=>u.email===e&&u.pass===p);
  if(!u)return toast('❌ بيانات الدخول غير صحيحة');
  db.currentUser=u;saveDb();toast('✅ مرحباً '+u.name);go('home');
}

function addToCart(pid){

function submitOrd(){
  const n=document.getElementById('oN').value.trim(),ph=document.getElementById('oPh').value.trim(),a=document.getElementById('oA').value.trim();

    total:tot,payScreenshot:payShot,status:'pending',date:new Date().toLocaleString('ar-EG'),timestamp:Date.now()};

}

function oCatMo(){ei=null;sMo('إضافة قسم',`<div class="fg"><label>اسم القسم</label><input id="cN" placeholder="اسم القسم"></div><div class="fg"><label>الوصف</label><textarea id="cD" rows="2" placeholder="وصف القسم"></textarea></div><div class="fg"><label>الأيقونة</label><input id="cI" placeholder="🌿" style="text-align:center;font-size:24px" maxlength="4"></div>`,'svCat()')}
function eCatMo(id){const c=db.cats.find(x=>x.id===id);ei=id;sMo('تعديل القسم',`<div class="fg"><label>اسم القسم</label><input id="cN" value="${c.name}"></div><div class="fg"><label>الوصف</label><textarea id="cD" rows="2">${c.desc}</textarea></div><div class="fg"><label>الأيقونة</label><input id="cI" value="${c.icon}" style="text-align:center;font-size:24px" maxlength="4"></div>`,'svCat()')}
function svCat(){const n=document.getElementById('cN').value.trim(),d=document.getElementById('cD').value.trim(),ic=document.getElementById('cI').value.trim()||'📦';if(!n)return toast('⚠️ أدخل اسم القسم');if(ei){const c=db.cats.find(x=>x.id===ei);c.name=n;c.desc=d;c.icon=ic;toast('✅ تم التحديث')}else{db.cats.push({id:'c_'+Date.now(),name:n,desc:d,icon:ic});toast('✅ تم الإضافة')}saveDb();clMo();go('adminCats')}
function dCat(id){const c=db.cats.find(x=>x.id===id);sMo('⚠️ حذف القسم',`<p>هل تريد حذف "${c.name}"؟ سيتم حذف منتجاته أيضاً.</p>`,`doDC('${id}')`)}

function oProdMo(){ei=null;pImgs=[];sMo('إضافة منتج',`
  <div class="fg"><label>اسم المنتج</label><input id="pN" placeholder="اسم المنتج"></div>
  <div class="fg"><label>القسم</label><select id="pC">${db.cats.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select></div>

function hPIm(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{cmpImg(ev.target.result,600,.7).then(c=>{pImgs=[c];document.getElementById('pImP').innerHTML=`<div class="img-it"><img src="${c}"><button class="img-rm" onclick="pImgs=[];document.getElementById('pImP').innerHTML=''">✕</button></div>`})};r.readAsDataURL(f)}

function svProd(){const n=document.getElementById('pN').value.trim(),cat=document.getElementById('pC').value,d=document.getElementById('pD').value.trim(),pr=parseInt(document.getElementById('pPr').value)||0,st=parseInt(document.getElementById('pSt').value)||0;
  if(!n)return toast('⚠️ أدخل اسم المنتج');
  if(ei){const p=db.products.find(x=>x.id===ei);Object.assign(p,{name:n,cat,desc:d,price:pr,stock:st,img:pImgs[0]||p.img});toast('✅ تم التحديث')}
  else{db.products.push({id:'p_'+Date.now(),name:n,cat,desc:d,price:pr,stock:st,img:pImgs[0]||''});toast('✅ تم الإضافة')}
  saveDb();clMo();go('adminProds')}
function dProd(id){const p=db.products.find(x=>x.id===id);sMo('⚠️ حذف المنتج',`<p>هل تريد حذف "${p.name}"؟</p>`,`doDP('${id}')`)}
function doDP(id){db.products=db.products.filter(p=>p.id!==id);saveDb();clMo();go('adminProds');toast('🗑️ تم الحذف')}

function rAdOrd(){
  const pe=db.orders.filter(o=>o.status==='pending').reverse();
  const ot=db.orders.filter(o=>o.status!=='pending').reverse();
  return `<div class="main"><button class="back" onclick="go('admin')">← لوحة التحكم</button><h2 class="sec-t" style="margin-bottom:20px">📦 إدارة الطلبات</h2>
  ${pe.length?`<h3 style="color:#856404;margin-bottom:12px">⏳ طلبات معلقة (${pe.length})</h3>`:''}${pe.map(rAO).join('')}
  ${ot.length?`<h3 style="color:var(--txtl);margin:24px 0 12px">📋 طلبات سابقة</h3>`:''}${ot.map(rAO).join('')}
  ${!db.orders.length?'<div class="empty"><div class="empty-ic">📦</div><h4>لا توجد طلبات</h4></div>':''}</div>`}

function rAO(o){return `<div class="order-card"><div class="order-hdr"><div><strong>${o.id}</strong><br><span style="font-size:12px;color:var(--txtl)">${o.date}</span></div>
  <span class="order-status ${o.status==='pending'?'st-pending':o.status==='confirmed'?'st-confirmed':'st-delivered'}">${o.status==='pending'?'⏳ معلق':o.status==='confirmed'?'✅ مؤكد':'📦 تم التوصيل'}</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><strong>👤:</strong> ${o.userName}</div><div><strong>📱:</strong> ${o.phone}</div><div style="grid-column:1/-1"><strong>📍:</strong> ${o.address}</div>${o.notes?`<div style="grid-column:1/-1"><strong>📝:</strong> ${o.notes}</div>`:''}</div>
  ${o.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px"><span>${i.name} × ${i.qty}</span><span>${i.price*i.qty} ج.م</span></div>`).join('')}
  <div style="font-weight:700;color:var(--p);padding-top:8px;border-top:1px solid var(--brd);margin-top:8px;text-align:left">الإجمالي: ${o.total} ج.م</div>
  ${o.payScreenshot?`<div style="margin-top:12px"><strong>🧾 سكرين شوت:</strong><br><img src="${o.payScreenshot}" style="max-width:200px;border-radius:8px;margin-top:8px;cursor:pointer" onclick="openLb(this.src)"></div>`:''}
  <div style="display:flex;gap:8px;margin-top:12px">
    ${o.status==='pending'?`<button class="btn btn-p btn-sm" onclick="upOrd('${o.id}','confirmed')">✅ تأكيد</button>`:''}
    ${o.status==='confirmed'?`<button class="btn btn-a btn-sm" onclick="upOrd('${o.id}','delivered')">📦 تم التوصيل</button>`:''}
    <button class="btn btn-d btn-sm" onclick="delOrd('${o.id}')">🗑️ حذف</button></div></div>`}
function upOrd(id,s){db.orders.find(x=>x.id===id).status=s;saveDb();render();toast('✅ تم التحديث')}
function delOrd(id){db.orders=db.orders.filter(o=>o.id!==id);saveDb();render();toast('🗑️ تم الحذف')}
<script>
function rAdSet(){return `<div class="main"><button class="back" onclick="go('admin')">← لوحة التحكم</button><h2 class="sec-t" style="margin-bottom:20px">⚙️ الإعدادات</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div class="card" style="padding:24px"><h3 style="margin-bottom:16px">🔐 تغيير كلمة مرور الأدمن</h3>
      <div class="fg"><label>الحالية</label><input type="password" id="oP" placeholder="••••••••"></div>
      <div class="fg"><label>الجديدة</label><input type="password" id="nP" placeholder="••••••••"></div>
      <button class="btn btn-p" onclick="chPass()">💾 حفظ</button></div>
    <div class="card" style="padding:24px"><h3 style="margin-bottom:16px">💳 طرق الدفع</h3>
      ${db.paymentMethods.map((pm,i)=>`<div class="pay-info"><h4>${pm.type==='instapay'?'⚡ إنستاباي':'📱 فودافون كاش'}</h4>
        <div class="fg" style="margin-bottom:6px"><label>الرقم</label><input id="pmN${i}" value="${pm.number}"></div>
        <div class="fg" style="margin-bottom:6px"><label>الاسم</label><input id="pmNa${i}" value="${pm.name}"></div></div>`).join('')}
      <button class="btn btn-p" onclick="svPay()">💾 حفظ الأرقام</button></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
    <div class="card" style="padding:24px"><h3 style="margin-bottom:16px">📱 روابط التواصل الاجتماعي</h3>
      <div class="fg"><label>رابط واتساب</label><input id="sWa" value="${db.socialLinks?.whatsapp||''}" placeholder="https://wa.me/20xxxxxxxxxx"></div>
      <div class="fg"><label>رابط فيسبوك</label><input id="sFb" value="${db.socialLinks?.facebook||''}" placeholder="https://facebook.com/page"></div>
      <button class="btn btn-p" onclick="svSocial()">💾 حفظ الروابط</button></div>
    <div class="card" style="padding:24px"><h3 style="margin-bottom:16px">🔊 صوت الإشعارات</h3>
      <p style="font-size:13px;color:var(--txtl);margin-bottom:12px">عند وصول طلب جديد، يصدر صوت تنبيه للأدمن</p>
      <button class="btn btn-a" onclick="playNotif()">▶️ تشغيل الصوت</button></div>
  </div></div>`}

function chPass(){const o=document.getElementById('oP').value,n=document.getElementById('nP').value;
  if(o!==db.adminPass)return toast('❌ كلمة المرور خاطئة');
  if(!n||n.length<4)return toast('⚠️ 4 أحرف على الأقل');
  db.adminPass=n;saveDb();toast('✅ تم التغيير')}

function svPay(){db.paymentMethods.forEach((pm,i)=>{pm.number=document.getElementById('pmN'+i).value.trim();pm.name=document.getElementById('pmNa'+i).value.trim()});saveDb();toast('✅ تم الحفظ')}

function svSocial(){if(!db.socialLinks)db.socialLinks={};db.socialLinks.whatsapp=document.getElementById('sWa').value.trim();db.socialLinks.facebook=document.getElementById('sFb').value.trim();saveDb();rSocial();toast('✅ تم الحفظ')}

// UTILS
function go(v){cv=v;render();window.scrollTo(0,0)}
function sMo(t,b,a){let mo=document.getElementById('mo');if(!mo){mo=document.createElement('div');mo.id='mo';mo.className='mo';document.body.appendChild(mo)}
  mo.innerHTML=`<div class="md"><div class="md-h"><h3>${t}</h3><button class="md-x" onclick="clMo()">✕</button></div><div class="md-b">${b}</div><div class="md-f"><button class="btn btn-s" onclick="clMo()">إلغاء</button><button class="btn btn-p" onclick="${a}">💾 حفظ</button></div></div>`;mo.classList.add('on')}
function clMo(){const m=document.getElementById('mo');if(m)m.classList.remove('on')}
function openLb(s){document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on')}
function closeLb(){document.getElementById('lb').classList.remove('on')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000)}
function cmpImg(dU,mW,q){return new Promise(r=>{const i=new Image;i.onload=()=>{const c=document.createElement('canvas');let w=i.width,h=i.height;if(w>mW){h=h*mW/w;w=mW}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);r(c.toDataURL('image/jpeg',q))};i.src=dU})}
function playNotif(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[440,554,659].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(.3,ctx.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+i*.15+.3);o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.3)})}catch(e){}}
function rFtr(){return `<footer class="ftr"><p><strong>عطارة المغربلين</strong> — بهارات و أعشاب طبيعية © 2026</p><p style="font-size:11px;opacity:.6;margin-top:4px">توصيل لجميع المحافظات • الدفع إنستاباي / فودافون كاش</p></footer>`}
render();
</script>
</body>
</html>
